services:
  api:
    container_name: ${PROJECT_SLUG}-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: ${APP_PORT:-3000}
      PORT: ${APP_PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SEED_ADMIN: ${SEED_ADMIN:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_DOMAIN: ${R2_PUBLIC_DOMAIN:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    expose:
      - "${APP_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${APP_PORT:-3000}/api >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-platform-network}
      - traefik.http.routers.smartagency-api.rule=Host(`${API_HOST:-api.smartagency-ye.com}`)
      - traefik.http.routers.smartagency-api.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.smartagency-api.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.smartagency-api.service=smartagency-api
      - traefik.http.services.smartagency-api.loadbalancer.server.port=${APP_PORT:-3000}

  frontend:
    container_name: ${PROJECT_SLUG}-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-platform-network}
      - traefik.http.routers.smartagency-frontend.rule=Host(`${FRONTEND_HOST:-smartagency-ye.com}`)
      - traefik.http.routers.smartagency-frontend.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.smartagency-frontend.tls.certresolver=${TRAEFIK_CERT_RESOLVER:-letsencrypt}
      - traefik.http.routers.smartagency-frontend.service=smartagency-frontend
      - traefik.http.services.smartagency-frontend.loadbalancer.server.port=80

networks:
  app-network:
    name: ${PROJECT_SLUG}-network
    driver: bridge
  platform-network:
    external: true
    name: ${TRAEFIK_NETWORK:-platform-network}
