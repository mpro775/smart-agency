services:
  api:
    container_name: ${PROJECT_SLUG}-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: ${APP_PORT:-3000}
      PORT: ${APP_PORT:-3000}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      R2_ENDPOINT: ${R2_ENDPOINT:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-}
    expose:
      - "${APP_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${APP_PORT:-3000}/api >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=l8y7dqdwvasfu6phazwubawu
      - traefik.http.services.smartagency_api.loadbalancer.server.port=${APP_PORT:-3000}

  frontend:
    container_name: ${PROJECT_SLUG}-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=l8y7dqdwvasfu6phazwubawu
      - traefik.http.services.smartagency_frontend.loadbalancer.server.port=80

networks:
  app-network:
    name: ${PROJECT_SLUG}-network
    driver: bridge
  platform-network:
    external: true
    name: platform-network
